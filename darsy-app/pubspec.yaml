name: darsy
description: "A modern educational mobile app built with Flutter and Firebase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase (only for analytics/crashlytics/messaging)
  firebase_core: ^4.4.0
  firebase_analytics: ^12.1.1
  firebase_crashlytics: ^5.0.7
  firebase_messaging: ^16.1.1
  cloud_firestore: ^6.1.2
  
  # Auth
  google_sign_in: ^6.2.2
  
  # Real-time Chat
  socket_io_client: ^3.0.2
  
  # State Management
  flutter_riverpod: ^3.2.1
  
  # UI & Animations
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.3.2
  google_fonts: ^8.0.1
  image_picker: ^1.1.2
  liquid_swipe: ^3.1.0
  image_cropper: ^8.0.2
  file_picker: ^8.1.7
  
  # PDF & Files
  syncfusion_flutter_pdfviewer: ^32.2.3
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  dio: ^5.9.1
  
  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  share_plus: ^12.0.1
  swipe_to: ^1.0.2
  in_app_review: ^2.0.11
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  youtube_player_flutter: ^9.1.3
  webview_flutter: ^4.10.0
  google_mobile_ads: ^7.0.0
  percent_indicator: ^4.2.5
  flutter_slidable: ^3.1.1
  font_awesome_flutter: ^10.12.0
  flip_card: ^0.7.0
  app_settings: ^7.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  hive_generator: any

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/lottie/
    - assets/translations/
