<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NewsCard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #d8dce3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 32px;
    padding: 60px 40px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/javascript">

function buildPath(W, H, CR, G, SR, IR, BW, BH, TbW, TbH) {
  const tx = BW + G, ty = BH + G;
  const bx = W - TbW - G, by = H - TbH - G;
  return [
    `M ${tx + SR} 0`,
    `L ${W - CR} 0`, `A ${CR} ${CR} 0 0 1 ${W} ${CR}`,
    `L ${W} ${by - SR}`, `A ${SR} ${SR} 0 0 1 ${W - SR} ${by}`,
    `L ${bx + IR} ${by}`, `A ${IR} ${IR} 0 0 0 ${bx} ${by + IR}`,
    `L ${bx} ${H - SR}`, `A ${SR} ${SR} 0 0 1 ${bx - SR} ${H}`,
    `L ${CR} ${H}`, `A ${CR} ${CR} 0 0 1 0 ${H - CR}`,
    `L 0 ${ty + SR}`, `A ${SR} ${SR} 0 0 1 ${SR} ${ty}`,
    `L ${tx - IR} ${ty}`, `A ${IR} ${IR} 0 0 0 ${tx} ${ty - IR}`,
    `L ${tx} ${SR}`, `A ${SR} ${SR} 0 0 1 ${tx + SR} 0`,
    `Z`
  ].join(' ');
}

const W   = 340;
const H   = 320;
const CR  = 28;
const G   = 8;
const SR  = 18;
const IR  = SR + G;
const BW  = 120, BH  = 36;
const TbW = 110, TbH = 38;
const GAP = 10;
const PILL_PAD  = 14;  // pill internal padding
const TEXT_PUSH = 10;  // extra push to the right for both text rows

const TY = BH + G;
const BY = H - TbH - G;

const IMG_R      = 10;
const IMG_TOP    = TY + GAP;
const IMG_BOTTOM = (H - BY) + GAP;
const IMG_LEFT   = GAP;
const IMG_RIGHT  = GAP;

// Title: top=0, height=BH, left = BW + PILL_PAD + TEXT_PUSH
const TITLE_LEFT  = BW + PILL_PAD + TEXT_PUSH;
const TITLE_RIGHT = GAP;
const TITLE_H     = BH;

// Meta: bottom=0, height=TbH, right = TbW + PILL_PAD + TEXT_PUSH (from card right)
// left pushed same amount from card left edge
const META_LEFT  = GAP + TEXT_PUSH;
const META_RIGHT = TbW + PILL_PAD + TEXT_PUSH;
const META_H     = TbH;

const cards = [
  { category: 'Product', title: 'New Math Simulations', image: 'https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=600&q=80', date: 'Feb 22, 2024', readTime: '5 min' },
  { category: 'Technology', title: 'AI reshapes newsrooms', image: 'https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=600&q=80', date: 'Feb 25, 2026', readTime: '4 min' },
  { category: 'Science', title: 'Deep ocean mapping', image: 'https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=600&q=80', date: 'Feb 24, 2026', readTime: '6 min' },
];

const root = document.getElementById('root');
root.style.cssText = 'display:flex;gap:32px;flex-wrap:wrap;justify-content:center;align-items:flex-start';
const arrow = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

const pillStyle = `position:absolute;display:flex;align-items:center;justify-content:center;background:#3aaa6a;color:#fff;font-weight:700;white-space:nowrap;gap:6px;box-shadow:0 2px 10px rgba(58,170,106,0.35);padding:0 ${PILL_PAD}px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;`;

cards.forEach((c, i) => {
  const path = buildPath(W, H, CR, G, SR, IR, BW, BH, TbW, TbH);
  const gid = `g${i}`;
  const wrap = document.createElement('div');
  wrap.style.cssText = `position:relative;width:${W}px;height:${H}px;flex-shrink:0;cursor:pointer;`;

  wrap.innerHTML = `
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"
      style="display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.07)) drop-shadow(0 8px 24px rgba(0,0,0,0.12))">
      <defs>
        <linearGradient id="${gid}" x1="0" y1="0" x2="0.4" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#edf0f4"/>
        </linearGradient>
      </defs>
      <path d="${path}" fill="url(#${gid})"/>
    </svg>

    <div style="position:absolute;inset:0;clip-path:path('${path}');">

      <!-- Title -->
      <div style="
        position:absolute;
        top:0; left:${TITLE_LEFT}px; right:${TITLE_RIGHT}px; height:${TITLE_H}px;
        display:flex; align-items:center; overflow:hidden;
      ">
        <span style="font-weight:700;font-size:14px;color:#1a1f2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">${c.title}</span>
      </div>

      <!-- Image -->
      <div style="
        position:absolute;
        top:${IMG_TOP}px; left:${IMG_LEFT}px; right:${IMG_RIGHT}px; bottom:${IMG_BOTTOM}px;
        border-radius:${IMG_R}px;
        background:url('${c.image}') center/cover #cdd5de;
      "></div>

      <!-- Meta -->
      <div style="
        position:absolute;
        bottom:0; left:${META_LEFT}px; right:${META_RIGHT}px; height:${META_H}px;
        display:flex; align-items:center; overflow:hidden;
      ">
        <span style="font-size:11px;color:#8a97a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">${c.date} · ${c.readTime}</span>
      </div>

    </div>

    <!-- Badge pill -->
    <div style="${pillStyle}top:0;left:0;width:${BW}px;height:${BH}px;border-radius:${BH/2}px;font-size:12.5px;">${c.category}</div>

    <!-- Read pill -->
    <div style="${pillStyle}bottom:0;right:0;width:${TbW}px;height:${TbH}px;border-radius:${TbH/2}px;font-size:13px;">READ ${arrow}</div>
  `;

  root.appendChild(wrap);
});
</script>
</body>
</html>
